<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TurboMailer Pro - Enterprise Email Broadcasting</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="/css/app.css" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a' },
            surface: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 800: '#1e293b', 850: '#172033', 900: '#0f172a', 950: '#020617' }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-surface-900 text-gray-100 min-h-screen transition-colors duration-200">
  <div id="app" class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-surface-850 border-r border-gray-800 flex-shrink-0 hidden md:flex flex-col">
      <div class="p-4 border-b border-gray-800">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
            <i class="fas fa-bolt text-white text-lg"></i>
          </div>
          <div>
            <h1 class="font-bold text-lg">TurboMailer</h1>
            <p class="text-xs text-gray-500">Pro v1.0</p>
          </div>
        </div>
      </div>
      <nav class="flex-1 p-3 space-y-1 overflow-y-auto" id="nav-menu">
        <a href="#" data-page="dashboard" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-surface-800 transition-all">
          <i class="fas fa-chart-pie w-5 text-center"></i><span>Dashboard</span>
        </a>
        <a href="#" data-page="smtp" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-surface-800 transition-all">
          <i class="fas fa-server w-5 text-center"></i><span>SMTP Manager</span>
        </a>
        <a href="#" data-page="compose" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-surface-800 transition-all">
          <i class="fas fa-pen-fancy w-5 text-center"></i><span>Compose</span>
        </a>
        <a href="#" data-page="templates" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-surface-800 transition-all">
          <i class="fas fa-template w-5 text-center"></i><span>Templates</span>
        </a>
        <a href="#" data-page="recipients" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-surface-800 transition-all">
          <i class="fas fa-users w-5 text-center"></i><span>Recipients</span>
        </a>
        <a href="#" data-page="campaigns" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-surface-800 transition-all">
          <i class="fas fa-paper-plane w-5 text-center"></i><span>Campaigns</span>
        </a>
        <a href="#" data-page="logs" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-surface-800 transition-all">
          <i class="fas fa-list w-5 text-center"></i><span>Logs</span>
        </a>
        <div class="pt-4 mt-4 border-t border-gray-800">
          <a href="#" data-page="settings" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-surface-800 transition-all">
            <i class="fas fa-cog w-5 text-center"></i><span>Settings</span>
          </a>
          <a href="#" id="logout-btn" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-red-400 hover:text-red-300 hover:bg-red-900/20 transition-all">
            <i class="fas fa-sign-out-alt w-5 text-center"></i><span>Logout</span>
          </a>
        </div>
      </nav>
    </aside>

    <!-- Mobile header -->
    <div class="md:hidden fixed top-0 left-0 right-0 z-50 bg-surface-850 border-b border-gray-800 p-3 flex items-center justify-between">
      <button id="mobile-menu-btn" class="text-gray-400 hover:text-white p-2">
        <i class="fas fa-bars text-xl"></i>
      </button>
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
          <i class="fas fa-bolt text-white text-xs"></i>
        </div>
        <span class="font-bold">TurboMailer</span>
      </div>
      <div></div>
    </div>

    <!-- Main Content -->
    <main id="main-content" class="flex-1 overflow-y-auto p-4 md:p-6 pt-16 md:pt-6 bg-surface-900">
      <!-- Loading spinner -->
      <div id="loading-overlay" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
        <div class="bg-surface-800 p-6 rounded-xl shadow-xl">
          <div class="animate-spin w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full mx-auto"></div>
          <p class="mt-3 text-gray-400 text-sm">Loading...</p>
        </div>
      </div>

      <!-- Dynamic content area -->
      <div id="page-content"></div>
    </main>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="fixed top-4 right-4 z-[100] space-y-2"></div>

  <script src="/js/auth.js"></script>
  <script src="/js/smtp.js"></script>
  <script src="/js/editor.js"></script>
  <script src="/js/recipients.js"></script>
  <script src="/js/campaigns.js"></script>
  <script src="/js/logs.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
